<svg width="260" height="48" viewBox="0 0 260 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Editorial brutalist mark — ink square, paper F, signal-green port -->
  <!-- Brief §3 + §6: sharp corners, single accent, paper/ink palette -->

  <!-- Ink background square (sharp) -->
  <rect width="48" height="48" fill="#0A0A08"/>

  <!-- F vertical stroke (paper) -->
  <rect x="10.5" y="9"  width="6.75" height="30" fill="#F4F0E8"/>
  <!-- F top bar -->
  <rect x="10.5" y="9"  width="25.5" height="6.75" fill="#F4F0E8"/>
  <!-- F middle bar -->
  <rect x="10.5" y="21.75" width="18" height="6.75" fill="#F4F0E8"/>

  <!-- Signal-green port — sharp square ending the middle bar -->
  <rect x="30" y="21.75" width="6.75" height="6.75" fill="#27A644"/>

  <!-- Wordmark: "freelance" — ink, sans, tight tracking -->
  <text x="62" y="31"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="22"
        font-weight="700"
        letter-spacing="-0.55"
        fill="#0A0A08">freelance</text>

  <!-- Wordmark: "hub" — signal green, serif italic, lighter weight -->
  <text x="167" y="31"
        font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
        font-size="22"
        font-weight="400"
        font-style="italic"
        letter-spacing="-0.22"
        fill="#27A644">hub</text>
</svg>
