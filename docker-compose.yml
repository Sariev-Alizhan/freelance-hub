# Self-host stack — app + Postgres + MinIO (S3-compatible).
# Supabase is still used for auth/realtime by default; you can run the
# official Supabase self-host stack alongside this, or swap auth later.
#
# Quickstart:
#   cp .env.example .env
#   docker compose up --build
#
# Then visit http://localhost:3000.
services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Override in .env to point at your own Postgres / Supabase / MinIO.
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@db:5432/freelancehub}
      S3_ENDPOINT:  ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET:    ${S3_BUCKET:-media}
      S3_REGION:    ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       freelancehub
    volumes:
      - db_data:/var/lib/postgresql/data
      # Migrations in supabase/migrations/ reference Supabase's auth schema and
      # RLS helpers — run them against a Supabase self-host stack, not this
      # plain Postgres. This `db` service is here for tools that only need a
      # generic Postgres (e.g. analytics, or a future next-auth migration).
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  minio_data:
